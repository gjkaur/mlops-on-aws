AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  Lab 10 companion demonstration - minimal CodeCommit + S3 + Model Registry group for teaching.
  Does NOT replicate SageMaker Projects Service Catalog MLOps template.

Parameters:
  ProjectSlug:
    Type: String
    AllowedPattern: ^[a-z][a-z0-9\-]{2,28}$
    Description: Lower-case slug appended to logical resource names (3-29 chars).

Resources:
  CodeRepository:
    Type: AWS::CodeCommit::Repository
    Properties:
      RepositoryDescription: Lab 10 companion - compare against SageMaker Project seed repos
      RepositoryName: !Sub mlops-l10-${ProjectSlug}-${AWS::AccountId}

  ArtifactBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled

  ModelPackageGroup:
    Type: AWS::SageMaker::ModelPackageGroup
    Properties:
      ModelPackageGroupDescription: Companion group - not wired to pipelines in this demo stack
      ModelPackageGroupName: !Sub mlops-l10-${ProjectSlug}-models

Outputs:
  CodeRepositoryCloneUrlHttp:
    Description: HTTPS clone URL
    Value: !GetAtt CodeRepository.CloneUrlHttp
  ArtifactBucketArn:
    Description: S3 bucket ARN for artefacts
    Value: !GetAtt ArtifactBucket.Arn
  ArtifactBucketName:
    Description: S3 bucket name
    Value: !Ref ArtifactBucket
  ModelPackageGroupName:
    Description: SageMaker Model Package Group Name
    Value: !Ref ModelPackageGroup
